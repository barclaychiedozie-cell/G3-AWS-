<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #3498db;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #2980b9;
    }

    input {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    pre {
      background: black;
      color: #00ff00;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>
  Admin Dashboard (Python Flask)
</header>

<div class="container">

  <div class="card">
    <h3>📋 View Users</h3>
    <button onclick="getUsers()">Get Users</button>
  </div>

  <div class="card">
    <h3>➕ Create User</h3>
    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <input id="role" placeholder="Role">
    <br>
    <button onclick="createUser()">Create User</button>
  </div>

  <div class="card">
    <h3>🔐 Assign Role</h3>
    <input id="roleUser" placeholder="User Name">
    <input id="newRole" placeholder="New Role">
    <br>
    <button onclick="assignRole()">Assign Role</button>
  </div>

  <div class="card">
    <h3>👨‍⚕️ Assign Clinician</h3>
    <input id="patient" placeholder="Patient Name">
    <input id="clinician" placeholder="Clinician Name">
    <br>
    <button onclick="assignClinician()">Assign</button>
  </div>

  <div class="card">
    <h3>📤 Upload Patient Data</h3>
    <button onclick="uploadData()">Upload Sample Data</button>
  </div>

  <div class="card">
    <h3>🚪 Logout</h3>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h3>📊 Output</h3>
    <pre id="output"></pre>
  </div>

</div>

<script>
function show(data) {
  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}

function getUsers() {
  fetch("/api/admin/users")
    .then(res => res.json())
    .then(show);
}

function createUser() {
  fetch("/api/admin/create-user", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: name.value,
      email: email.value,
      role: role.value
    })
  })
  .then(res => res.json())
  .then(show);
}

function assignRole() {
  fetch("/api/admin/assign-role", {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      user: roleUser.value,
      role: newRole.value
    })
  })
  .then(res => res.json())
  .then(show);
}

function assignClinician() {
  fetch("/api/admin/assign-clinician", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      patient: patient.value,
      clinician: clinician.value
    })
  })
  .then(res => res.json())
  .then(show);
}

function uploadData() {
  fetch("/api/admin/upload-data", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      patient: "Patient1",
      pressure: "High",
      status: "Needs attention"
    })
  })
  .then(res => res.json())
  .then(show);
}

function logout() {
  fetch("/api/admin/logout", {
    method: "POST"
  })
  .then(res => res.json())
  .then(data => {
    show(data);
    alert("Logged out successfully!");
  });
}
</script>

</body>
</html>
