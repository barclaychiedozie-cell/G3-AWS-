<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Graphene Trace</title>
  </head>
  <body>
    {% if user.is_authenticated %}
      <p>
        Logged in as {{ user.username }} |
        <form method="post" action="{% url 'logout' %}" style="display:inline">
          {% csrf_token %}<button type="submit">Logout</button>
        </form>
      </p>
    {% endif %}

    {% block content %}{% endblock %}
  </body>
</html>
