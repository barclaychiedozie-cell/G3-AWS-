{% extends "base.html" %}

{% block nav_right %}{% endblock %}

{% block content %}
  <div class="card" style="max-width:520px;margin:40px auto;">
    <h1 class="h1">Reset Password</h1>
    <p class="p">Enter your email address and we’ll send you a password reset link.</p>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <div style="display:flex; gap:10px; align-items:center; justify-content:space-between; margin-top:12px; flex-wrap:wrap;">
        <button class="btn btn-primary" type="submit">Send reset link</button>
        <a class="btn" href="{% url 'login' %}">Back to login</a>
      </div>
    </form>
  </div>
{% endblock %}
