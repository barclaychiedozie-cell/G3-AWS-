{% extends "base.html" %}

{% block content %}
  <div class="card" style="max-width:520px;margin:40px auto;">
    <h1 class="h1">Login</h1>
    <p class="p">Sign in to securely access your dashboard.</p>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit">Login</button>
    </form>
  </div>
{% endblock %}
