{% extends "base.html" %}

{% block nav_right %}{% endblock %}

{% block content %}
  <div class="card" style="max-width:520px;margin:40px auto;">
    <h1 class="h1">Check your email</h1>
    <p class="p">
      If an account exists for the email you entered, we’ve sent a password reset link.
      Please check your inbox (and spam folder).
    </p>

    <div style="display:flex; gap:10px; align-items:center; justify-content:flex-start; margin-top:12px; flex-wrap:wrap;">
      <a class="btn btn-primary" href="{% url 'login' %}">Back to login</a>
      <a class="btn" href="{% url 'password_reset' %}">Send again</a>
    </div>
  </div>
{% endblock %}
